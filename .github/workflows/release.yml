name: Build and Publish macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: |
          chmod +x scripts/make_app_bundle.sh
          ./scripts/make_app_bundle.sh

      - name: Package release artifact
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent dist/MiteTool.app "release/MiteTool-${GITHUB_REF_NAME}.app.zip"
          shasum -a 256 "release/MiteTool-${GITHUB_REF_NAME}.app.zip" > "release/MiteTool-${GITHUB_REF_NAME}.app.zip.sha256"

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          name: MiteTool ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/MiteTool-${{ github.ref_name }}.app.zip
            release/MiteTool-${{ github.ref_name }}.app.zip.sha256
